<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>少年沃积分管理</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 现代字体 Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #03050a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            transition: background 0.2s;
        }
        /* 浅色主题 (需SVIP) */
        body.light-mode {
            background: #1a1e24;
            --bg-deep: #222831;
            --bg-elevated: #2d343d;
            --bg-card: rgba(45, 52, 61, 0.7);
            --bg-input: #3a424e;
            --border-muted: #4b5563;
            --border-glow: #6b7280;
            --text-primary: #ffffff;
            --text-secondary: #e5e7eb;
            --text-tertiary: #9ca3af;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --card-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            --card-hover-shadow: 0 24px 40px -16px var(--accent), 0 0 0 1px var(--accent) inset;
        }
        body.light-mode .btn-primary,
        body.light-mode .timer-btn,
        body.light-mode .profile-btn,
        body.light-mode .modal-close,
        body.light-mode .svip-btn,
        body.light-mode .add-student-section button,
        body.light-mode .group-manager button,
        body.light-mode .tool-btn:hover,
        body.light-mode .batch-btn:hover,
        body.light-mode .back-btn:hover,
        body.light-mode .delete-class-detail:hover,
        body.light-mode .student-card-btn:hover {
            color: #ffffff !important;
        }
        body:not(.light-mode) .btn-primary,
        body:not(.light-mode) .timer-btn,
        body:not(.light-mode) .profile-btn,
        body:not(.light-mode) .modal-close,
        body:not(.light-mode) .svip-btn,
        body:not(.light-mode) .add-student-section button,
        body:not(.light-mode) .group-manager button {
            color: black;
        }
        /* 卡通主题 (需SVIP) */
        body.cartoon-mode {
            background: #f9e5d2;
            --bg-deep: #ffefdb;
            --bg-elevated: #fff5e6;
            --bg-card: rgba(255, 226, 193, 0.7);
            --bg-input: #ffdbb5;
            --border-muted: #f5bc8f;
            --border-glow: #f0a56e;
            --text-primary: #5d3a1a;
            --text-secondary: #7b4f2b;
            --text-tertiary: #9b6e45;
            --accent: #f97316;
            --accent-glow: rgba(249, 115, 22, 0.3);
            --danger: #dc2626;
            --warning: #f59e0b;
            --success: #10b981;
            --card-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px #ffcba1 inset;
            --card-hover-shadow: 0 24px 40px -16px #f97316, 0 0 0 1px var(--accent) inset;
        }
        body.cartoon-mode .btn-primary,
        body.cartoon-mode .timer-btn,
        body.cartoon-mode .profile-btn,
        body.cartoon-mode .modal-close,
        body.cartoon-mode .svip-btn,
        body.cartoon-mode .add-student-section button,
        body.cartoon-mode .group-manager button {
            color: black;
        }
        :root {
            --bg-deep: #03050a;
            --bg-elevated: #0b0f16;
            --bg-card: rgba(19, 26, 36, 0.7);
            --bg-input: #1e2632;
            --border-muted: #25303e;
            --border-glow: #2f3f54;
            --text-primary: #f0f6ff;
            --text-secondary: #b8c9e6;
            --text-tertiary: #7f95b5;
            --accent: #3b82f6;
            --accent-hover: #5f9cf0;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --card-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            --card-hover-shadow: 0 24px 40px -16px rgba(59, 130, 246, 0.3), 0 0 0 1px var(--accent) inset;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 错误蓝屏 */
        .fatal-error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a2f6c;
            background: linear-gradient(145deg, #1e3a8a, #0c1b3a);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding-left: 10%;
            padding-right: 10%;
            text-align: left;
            font-family: monospace;
            color: white;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .fatal-error-overlay h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-shadow: 4px 4px 0 #0a1a3a;
            margin-bottom: 1rem;
            text-align: left;
        }
        .fatal-error-overlay .error-sub {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            display: inline-block;
            text-align: left;
        }
        .fatal-error-overlay .error-code {
            font-size: 1.1rem;
            background: #0a1f4a;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            margin: 1rem 0;
            font-weight: bold;
            border: 1px solid #88aaff;
            display: inline-block;
            text-align: left;
        }
        .fatal-error-overlay .wechat-info {
            margin-top: 2rem;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            display: inline-block;
            text-align: left;
        }
        .fatal-error-overlay .reload-btn {
            margin-top: 2rem;
            background: white;
            color: #1e3a8a;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
            text-align: left;
        }
        .fatal-error-overlay .reload-btn:hover {
            transform: scale(1.02);
            background: #e0f0ff;
        }
        /* 通用文字颜色 */
        .logo h1,
        .class-title,
        .class-info,
        .student-name,
        .profile-field input,
        .profile-field select,
        .input-field,
        .user-greeting,
        .btn-icon,
        .tool-btn,
        .batch-btn,
        .back-btn,
        .delete-class-detail,
        .class-tab,
        .group-manager input,
        .add-student-section input,
        .add-student-section select,
        .modal-content,
        .profile-card,
        .auth-card,
        .feature-card h4,
        .timer-display,
        .student-points {
            color: var(--text-primary);
        }
        .class-stats,
        .footer-note,
        .checkbox-row,
        .forgot-password-link,
        .auth-tab:not(.active),
        .tool-section label,
        .student-actions-card .student-card-btn {
            color: var(--text-secondary);
        }
        .profile-field label,
        .empty-grid,
        .svip-section span:not(.svip-badge) {
            color: var(--text-tertiary);
        }
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: var(--accent);
            color: black;
            border-radius: 50%;
            font-size: 0.9rem;
            font-weight: 700;
            margin-right: 12px;
        }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ff6ec4, #7873f5, #3b82f6, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }
        .logo .version,
        .logo .vip-version {
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(255, 255, 255, 0.02);
            background-image: linear-gradient(145deg, #ffb86b, #ff6bcb, #6bc5ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .logo .version:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            text-shadow: 0 0 6px rgba(255, 255, 200, 0.5);
        }
        #app {
            width: 100%;
            max-width: 1440px;
            min-height: 90vh;
            background: var(--bg-deep);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -20px black, 0 0 0 1px #1f2937;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            position: relative;
            animation: appEnter 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        @keyframes appEnter {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        #app::before {
            content: '';
            position: absolute;
            top: -15%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        #app::after {
            content: '';
            position: absolute;
            bottom: -15%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .app-header,
        .main-container,
        .detail-container,
        .auth-container {
            position: relative;
            z-index: 2;
        }
        .main-container,
        .detail-container,
        .auth-container {
            animation: contentFadeUp 0.4s ease-out;
        }
        @keyframes contentFadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .app-header {
            padding: 1.5rem 2.8rem;
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.2rem;
            box-shadow: 0 10px 25px -10px black;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .user-greeting {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .user-greeting:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 18px var(--accent-glow);
            transform: translateY(-2px);
        }
        .btn-icon {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .btn-icon:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--accent-glow);
        }
        .btn-icon:active {
            transform: scale(0.96);
            transition: transform 0.05s;
        }
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: modalOverlayFade 0.2s ease-out;
        }
        @keyframes modalOverlayFade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px black;
            animation: modalZoomIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            backdrop-filter: blur(16px);
        }
        @keyframes modalZoomIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-content h2 {
            color: var(--accent);
            margin-bottom: 1rem;
        }
        .modal-close {
            background: var(--accent);
            border: none;
            border-radius: 60px;
            padding: 0.6rem 2rem;
            font-weight: 600;
            cursor: pointer;
            float: right;
            color: black;
            transition: all 0.2s ease;
        }
        .modal-close:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .modal-close:active {
            transform: scale(0.97);
        }
        .account-list {
            list-style: none;
            margin: 1.5rem 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .account-item {
            padding: 0.8rem 1.2rem;
            background: var(--bg-input);
            border-radius: 60px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .account-item:hover {
            background: var(--accent);
            color: black;
            transform: translateX(5px);
        }
        /* 个人主页 */
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 2.5rem;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            animation: fadeScaleIn 0.3s ease;
            backdrop-filter: blur(12px);
        }
        @keyframes fadeScaleIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent), #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: white;
            margin: 0 auto 1.5rem;
            transition: transform 0.2s;
        }
        .profile-avatar:hover {
            transform: scale(1.02);
        }
        .profile-field {
            margin-bottom: 1.2rem;
        }
        .profile-field label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }
        .profile-field input,
        .profile-field select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-muted);
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .profile-field input:focus,
        .profile-field select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
            outline: none;
        }
        .svip-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .svip-badge {
            background: gold;
            color: black;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-weight: 600;
        }
        .svip-btn {
            background: var(--accent);
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            color: black;
            transition: all 0.2s;
        }
        .svip-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .profile-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        .profile-btn {
            background: var(--accent);
            border: none;
            border-radius: 60px;
            padding: 0.7rem 2rem;
            font-weight: 600;
            cursor: pointer;
            color: black;
            transition: all 0.2s;
        }
        .profile-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .profile-btn:active {
            transform: scale(0.97);
        }
        .profile-btn.secondary {
            background: rgba(255, 255, 255, 0.02);
        }
        /* SVIP功能区 */
        .svip-features {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 2rem;
            border: 1px solid var(--accent);
            backdrop-filter: blur(8px);
        }
        .svip-features h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .feature-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border-glow);
            transition: all 0.25s;
            backdrop-filter: blur(8px);
        }
        .feature-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 20px -8px var(--accent-glow);
        }
        .timer-display {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: monospace;
            margin: 1rem 0;
        }
        .timer-controls,
        .stopwatch-controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .timer-btn {
            background: var(--accent);
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            color: black;
            transition: var(--transition);
        }
        .timer-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .timer-btn:active {
            transform: scale(0.96);
        }
        .timer-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
        }
        /* 登录/注册卡片 */
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 460px;
            border-radius: 2.5rem;
            padding: 2.8rem 2.5rem;
            border: 1px solid var(--border-glow);
            box-shadow: var(--card-shadow);
            animation: cardGlow 0.5s ease-out;
            backdrop-filter: blur(16px);
        }
        @keyframes cardGlow {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-muted);
            padding-bottom: 1.2rem;
        }
        .auth-tab {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 0.7rem;
            border-radius: 60px;
            cursor: pointer;
            transition: var(--transition);
        }
        .auth-tab.active {
            background: rgba(59, 130, 246, 0.15);
            box-shadow: 0 0 0 1px var(--accent);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .input-field {
            background: var(--bg-input);
            border: 1px solid var(--border-muted);
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;

    <script>
        (function() {
            const STORAGE_USERS = 'points_users';
            const STORAGE_REMEMBER = 'remember_credentials';
            const STORAGE_KEEP_LOGIN = 'keep_login';
            const STORAGE_THEME = 'user_theme';
            const STORAGE_DEV_MODE = 'dev_mode_active';
            const VERSION_STRING = 'shenlinOS BetaNEXT-3.1';

            const genId = () => 'id_' + Date.now() + Math.random().toString(36).substr(2, 6);
            const encodePass = (pwd) => btoa(pwd);
            const decodePass = (encoded) => atob(encoded);
            const defaultProfile = { avatar: '', gender: '保密', vipExpire: 0, systemActivatedUntil: 0 };

            // ---------- 音效合成 ----------
            let audioCtx = null;

            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                return audioCtx;
            }

            function playErrorSound() {
                try {
                    const ctx = getAudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } catch (e) {}
            }

            function playStartupSound() {
                try {
                    const ctx = getAudioContext();
                    const now = ctx.currentTime;
                    // 模拟Mac启动音的和弦
                    const notes = [261.63, 329.63, 392.00, 523.25]; // C4 E4 G4 C5
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.12);
                        gain.gain.setValueAtTime(0.25, now + i * 0.12);
                        gain.gain.linearRampToValueAtTime(0.01, now + i * 0.12 + 0.8);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now + i * 0.12);
                        osc.stop(now + i * 0.12 + 0.9);
                    });
                } catch (e) {}
            }

            let isErrorOverlayActive = false;

            function showFatalError(code, details = '') {
                if (isErrorOverlayActive) return;
                isErrorOverlayActive = true;
                playErrorSound();
                const ex = document.querySelector('.fatal-error-overlay');
                if (ex) ex.remove();
                const overlay = document.createElement('div');
                overlay.className = 'fatal-error-overlay';
                overlay.innerHTML =
                    `<h1>:(</h1><div class="error-sub">系统遇到问题</div><div class="error-code">错误代码：${escapeHtml(code)}</div><div style="max-width:80%;margin:0.5rem 0;font-size:1rem;">${escapeHtml(details)}</div><div class="wechat-info"><i class="fa-brands fa-weixin"></i> 请截图并向微信公众号 <strong style="color:#ffdd88;">Dear7215</strong> 反馈问题</div><button class="reload-btn" id="fatal-reload-btn"><i class="fa-solid fa-rotate-right"></i> 重新加载页面</button>`;
                document.body.appendChild(overlay);
                document.getElementById('fatal-reload-btn')?.addEventListener('click', () => window.location.reload());
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
            }

            let lastHeartbeat = Date.now(),
                heartbeatCheckInterval = null,
                heartbeatRAF = null;

            function startHeartbeatDetection() {
                if (heartbeatCheckInterval) clearInterval(heartbeatCheckInterval);
                if (heartbeatRAF) cancelAnimationFrame(heartbeatRAF);
                lastHeartbeat = Date.now();

                function beat() {
                    lastHeartbeat = Date.now();
                    if (!isErrorOverlayActive) heartbeatRAF = requestAnimationFrame(beat);
                }
                heartbeatRAF = requestAnimationFrame(beat);
                heartbeatCheckInterval = setInterval(() => {
                    if (isErrorOverlayActive) return;
                    if (Date.now() - lastHeartbeat > 5500) showFatalError('THREAD_BLOCKED_0xDEAD',
                        '页面主线程长时间未响应，可能发生卡死或无限循环。');
                }, 5000);
            }
            window.addEventListener('error', (e) => {
                if (isErrorOverlayActive) return;
                const msg = e.message || e.error?.message || '未知脚本错误';
                const stack = e.error?.stack || '';
                showFatalError('RUNTIME_ERROR', `${msg}\n${stack.slice(0,200)}`);
            });
            window.addEventListener('unhandledrejection', (e) => {
                if (isErrorOverlayActive) return;
                const reason = e.reason?.message || e.reason || 'Promise未捕获异常';
                showFatalError('PROMISE_REJECTION', String(reason).slice(0, 300));
            });

            let devModeEnabled = (() => { try { return localStorage.getItem(STORAGE_DEV_MODE) ===
                    'true'; } catch { return false; } })();

            function saveDevModeState(s) { devModeEnabled = s;
                localStorage.setItem(STORAGE_DEV_MODE, s ? 'true' : 'false'); }

            function triggerCrashForDev() {
                if (!devModeEnabled) { alert('未开启开发者模式'); return; }
                showFatalError('DEV_MANUAL_CRASH', '用户通过开发者模式【卡死按钮】触发系统模拟崩溃，页面将进入无响应状态。');
                setTimeout(() => { while (true) {} }, 50);
            }

            let clockInterval = null;

            function showFullscreenClock() {
                const existing = document.querySelector('.fullscreen-clock');
                if (existing) existing.remove();
                if (clockInterval) clearInterval(clockInterval);
                const clockDiv = document.createElement('div');
                clockDiv.className = 'fullscreen-clock';
                const timeSpan = document.createElement('div');
                timeSpan.className = 'clock-time';
                const dateSpan = document.createElement('div');
                dateSpan.className = 'clock-date';
                const hint = document.createElement('div');
                hint.className = 'clock-close-hint';
                hint.innerHTML = '<i class="fa-regular fa-circle-xmark"></i> 点击任意位置关闭';
                clockDiv.appendChild(timeSpan);
                clockDiv.appendChild(dateSpan);
                clockDiv.appendChild(hint);
                document.body.appendChild(clockDiv);

                function update() {
                    const now = new Date();
                    let h = now.getHours(),
                        m = now.getMinutes().toString().padStart(2, '0'),
                        s = now.getSeconds().toString().padStart(2, '0');
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    let h12 = h % 12;
                    if (h12 === 0) h12 = 12;
                    timeSpan.innerHTML =
                        `${h12.toString().padStart(2,'0')}:${m}:${s} <span class="ampm">${ampm}</span>`;
                    const y = now.getFullYear(),
                        mo = (now.getMonth() + 1).toString().padStart(2, '0'),
                        d = now.getDate().toString().padStart(2, '0');
                    const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                    dateSpan.textContent = `${y}.${mo}.${d} ${days[now.getDay()]}`;
                }
                update();
                clockInterval = setInterval(update, 1000);
                const close = () => {
                    if (clockInterval) clearInterval(clockInterval);
                    clockInterval = null;
                    if (clockDiv && clockDiv.parentNode) clockDiv.parentNode.removeChild(clockDiv);
                };
                clockDiv.addEventListener('click', close);
                clockDiv.addEventListener('touchstart', close);
            }

            let historyStack = [],
                historyIndex = -1;
            const MAX_HISTORY = 50;

            function deepCopyUserData() { return JSON.parse(JSON.stringify(userData)); }

            function pushHistory() {
                if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
                const snap = deepCopyUserData();
                historyStack.push(snap);
                if (historyStack.length > MAX_HISTORY) { historyStack.shift(); } else { historyIndex = historyStack
                        .length - 1; }
            }

            function undo() {
                if (historyIndex <= 0) { alert('没有可以撤销的操作了'); return; }
                historyIndex--;
                const prev = historyStack[historyIndex];
                Object.assign(userData, prev);
                saveUserData(currentUser, userData);
                renderMain();
            }

            function resetHistoryAndPush() { historyStack = [];
                historyIndex = -1;
                pushHistory(); }

            function isSystemActivated() { return currentUser && (userData.profile?.systemActivatedUntil || 0) > Date
                .now(); }

            function getWeightedRandomStudent(classId) {
                const students = userData.students.filter(s => s.classId === classId);
                if (students.length === 0) return null;
                let total = 0;
                const weights = [];
                students.forEach(stu => {
                    const w = (userData.randomProbWeights && userData.randomProbWeights[`${classId}_${stu.id}`] !==
                        undefined) ? userData.randomProbWeights[`${classId}_${stu.id}`] : 1;
                    total += w;
                    weights.push({ student: stu, weight: w });
                });
                if (total === 0) return null;
                let rand = Math.random() * total;
                for (let item of weights) {
                    if (rand < item.weight) return item.student;
                    rand -= item.weight;
                }
                return null;
            }

            function showProgressModal(action, onComplete) {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML =
                    `<div class="modal-content progress-modal" style="max-width:300px;"><h2><i class="fa-solid fa-spinner fa-pulse"></i> ${action}中</h2><div class="progress-bar-container"><div class="progress-bar-fill" id="progress-fill"></div></div><p id="progress-text">0%</p></div>`;
                document.body.appendChild(modal);
                const fill = modal.querySelector('#progress-fill');
                const text = modal.querySelector('#progress-text');
                let p = 0;
                const int = setInterval(() => {
                    p += 4;
                    if (p >= 100) {
                        p = 100;
                        clearInterval(int);
                        fill.style.width = '100%';
                        text.innerText = '100%';
                        setTimeout(() => {
                            modal.remove();
                            if (onComplete) onComplete();
                        }, 200);
                    } else {
                        fill.style.width = p + '%';
                        text.innerText = p + '%';
                    }
                }, 20);
            }

            function extractVersionNumber(v) { if (!v) return null;
                const m = v.match(/(\d+\.\d+(?:\.\d+)?)/); return m ? m[1] : null; }

            function parseVersionToArray(v) { const e = extractVersionNumber(v); if (!e) return null; return e.split('.')
                    .map(Number); }

            function compareVersions(cur, lat) {
                const ca = parseVersionToArray(cur),
                    la = parseVersionToArray(lat);
                if (!ca || !la) return null;
                const max = Math.max(ca.length, la.length);
                for (let i = 0; i < max; i++) { const a = ca[i] || 0,
                        b = la[i] || 0; if (b > a) return 1; if (b < a) return -1; }
                return 0;
            }

            const AVAILABLE_APPS = [
                { id: 'random_probability', name: '随机点名概率调整', icon: 'fa-dice-d6',
                    description: '自定义每个学生被点名的权重，实现概率调整' },
                { id: 'system_updater', name: '系统更新', icon: 'fa-arrows-rotate',
                    description: '检查shenlinOS系统更新，获取最新版本信息' },
                { id: 'kuaishou', name: '快手', icon: 'fa-video', description: '刷快手短视频，轻松一刻' }
            ];

            function getInstalledApps() { if (!userData.installedApps) userData.installedApps = []; return userData
                    .installedApps; }

            function isAppInstalled(appId) { return getInstalledApps().includes(appId); }

            function refreshAppDrawer() {
                if (currentUser) { removeAppDrawer();

            async function installApp(appId) {
                if (!isSystemActivated()) { alert('系统未激活，无法安装应用。请先激活系统（设置中使用激活码或试用）。'); return false; }
                if (isAppInstalled(appId)) return false;

                        saveUserData(currentUser, userData);
                        refreshAppDrawer();
                        resolve(true); }); });

            async function uninstallApp(appId) {
                if (!isSystemActivated()) { alert('系统未激活，无法卸载应用。'); return false; }
                const idx = userData.installedApps.indexOf(appId);
                if (idx === -1) return false;
                return new Promise((resolve) => { showProgressModal('卸载', () => { userData.installedApps.splice(

                        saveUserData(currentUser, userData);

            const GITHUB_RELEASES_URL = 'https://github.com/7215yang/snwjfxt/releases';

            function showSystemUpdater() {

                const modal = document.createElement('div');

                    `<div class="modal-content" style="max-width:520px;text-align:center;"><h2><i class="fa-solid fa-arrows-rotate"></i> 系统更新</h2><div id="updater-status-area"><div style="margin:1.5rem 0;"><i class="fa-solid fa-cloud-arrow-down updater-status-icon" style="color:var(--accent);"></i></div><div class="updater-info-row"><span class="label">当前版本</span><span class="value">${escapeHtml(VERSION_STRING)}</span></div><div class="updater-info-row" id="latest-version-row" style="display:none;"><span class="label">最新版本</span><span class="value new-version" id="latest-version-text">--</span></div><div id="updater-message" style="margin:1rem 0;font-size:1rem;color:var(--text-secondary);min-height:3rem;"><span id="updater-msg-text">点击下方按钮检查更新</span></div></div><div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem;"><button class="profile-btn" id="check-update-btn"><i class="fa-solid fa-magnifying-glass"></i> 检查更新</button><button class="profile-btn secondary" id="goto-releases-btn" style="display:none;"><i class="fa-solid fa-arrow-up-right-from-square"></i> 前往下载</button></div><button class="modal-close" id="updater-close" style="margin-top:1rem;">关闭</button></div>`;
                document.body.appendChild(modal);
                const checkBtn = document.getElementById('check-update-btn'),
                    gotoBtn = document.getElementById('goto-releases-btn'),
                    latestRow = document.getElementById('latest-version-row'),
                    latestText = document.getElementById('latest-version-text'),
                    msgText = document.getElementById('updater-msg-text'),
                    icon = modal.querySelector('.updater-status-icon');
                let latestUrl = GITHUB_RELEASES_URL,
                    isChecking = false;
                async function doCheck() {
                    if (isChecking) return;
                    isChecking = true;
                    checkBtn.disabled = true;
                    checkBtn.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i> 检查中...';
                    msgText.textContent = '正在连接到更新服务器...';
                    icon.className = 'fa-solid fa-spinner fa-pulse updater-status-icon';
                    icon.style.color = 'var(--accent)';
                    latestRow.style.display = 'none';
                    gotoBtn.style.display = 'none';
                    try {
                        const res = await fetch(GITHUB_API_URL, { headers: { 'Accept': 'application/vnd.github+json' },
                            signal: AbortSignal.timeout ? AbortSignal.timeout(15000) : undefined });
                        if (!res.ok) {
                            if (res.status === 404) { msgText.textContent = '暂无发布版本信息';
                                icon.className = 'fa-solid fa-circle-exclamation updater-status-icon'; } else if (res
                                .status === 403) { msgText.textContent = 'API请求次数已达上限，请稍后再试'; } else { msgText
                                    .textContent = `服务器返回错误 (${res.status})`; }
                            return;
                        }
                        const data = await res.json();
                        const tag = data.tag_name || '';
                        const htmlUrl = data.html_url || GITHUB_RELEASES_URL;
                        latestUrl = htmlUrl;
                        if (!tag) { msgText.textContent = '无法解析版本号';
                            latestRow.style.display = 'none';
                            gotoBtn.style.display = 'inline-flex'; return; }
                        latestRow.style.display = 'flex';
                        latestText.textContent = tag;
                        const cmp = compareVersions(VERSION_STRING, tag);
                        if (cmp === null) { msgText.textContent = '无法比较版本号';
                            icon.className = 'fa-solid fa-circle-question updater-status-icon';
                            gotoBtn.style.display = 'inline-flex'; } else if (cmp > 0) { msgText.textContent =
                                '🎉 发现新版本！';
                            icon.className = 'fa-solid fa-circle-arrow-up updater-status-icon';
                            icon.style.color = '#10b981';
                            gotoBtn.style.display = 'inline-flex'; } else if (cmp === 0) { msgText.textContent =
                                '✅ 已是最新版本';
                            icon.className = 'fa-solid fa-circle-check updater-status-icon';
                            icon.style.color = '#10b981'; } else { msgText.textContent = 'ℹ️ 当前版本较新';
                            icon.className = 'fa-solid fa-circle-check updater-status-icon';
                            icon.style.color = '#10b981'; }
                    } catch (err) { msgText.textContent = '检查更新失败：' + (err.message || '网络错误');
                        icon.className = 'fa-solid fa-circle-exclamation updater-status-icon'; } finally { isChecking =
                            false;
                        checkBtn.disabled = false;
                        checkBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> 检查更新'; }
                }
                checkBtn.addEventListener('click', doCheck);
                gotoBtn.addEventListener('click', () => window.open(latestUrl, '_blank'));
                document.getElementById('updater-close').addEventListener('click', () => document.body.removeChild(
                    modal));
                modal.addEventListener('click', e => { if (e.target === modal) document.body.removeChild(modal); });
            }

                        a.total);
                    gws.forEach((g, i) => { gcards +=
                            `<div class="class-card"><div class="class-header"><span class="class-title"><span class="rank-badge">${i+1}</span><i class="fa-regular fa-people-group"></i> ${g.name}</span><button class="delete-class-btn" data-action="delete-group" data-group-id="${g.id}"><i class="fa-solid fa-trash"></i></button></div><div class="class-stats"><span>${g.members.length}人</span><span>总分 ${g.total}</span></div><div>${g.members.map(m=>m.name).join('、')||'无成员'}</div></div>`; });
                    content =
                        `<div class="group-manager"><input type="text" id="new-group-name" placeholder="新小组名称"><button id="add-group-btn"><i class="fa-solid fa-plus"></i> 创建小组</button></div><div class="class-grid">${gcards||'<div class="empty-grid">暂无小组</div>'}</div>`; }
                const html =
                    `<div class="app-header"><div class="logo"><h1>少年沃积分管理 · 班级详情 <span class="version">${VERSION_STRING}</span></h1></div><div class="user-area"><div class="user-greeting" id="profile-btn"><i class="fa-regular fa-circle-user"></i> ${currentUser} ${vip?'<span class="svip-badge-user"><i class="fa-regular fa-gem"></i> SVIP</span>':''}</div><button class="btn-icon" id="settings-btn"><i class="fa-solid fa-gear"></i> 设置</button><button class="btn-icon" id="more-features-detail-btn"><i class="fa-solid fa-ellipsis-h"></i> 更多</button><button class="btn-icon" id="switch-account-detail"><i class="fa-solid fa-arrow-right-arrow-left"></i> 切换</button><button class="btn-icon" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> 注销</button></div></div><div class="detail-container"><div class="detail-header"><button class="back-btn" id="back-to-list"><i class="fa-solid fa-arrow-left"></i> 返回班级列表</button><div class="class-info"><i class="fa-regular fa-rectangle-ad"></i> ${cls.name}</div><div><button class="btn-icon" id="student-rankings-btn"><i class="fa-solid fa-ranking-star"></i> 学生排行</button><button class="btn-icon" id="svip-panel-btn" style="color:gold;"><i class="fa-regular fa-gem"></i> SVIP功能</button><button class="delete-class-detail" id="delete-class-detail"><i class="fa-solid fa-trash"></i> 删除班级</button></div></div>${cls.groupMode?`<div class="class-tabs"><button class="class-tab ${classDetailTab==='students'?'active':''}" id="tab-students">个人积分</button><button class="class-tab ${classDetailTab==='groups'?'active':''}" id="tab-groups">小组排行</button></div>`:''}<div class="batch-bar"><button class="batch-btn" id="class-inc"><i class="fa-solid fa-circle-plus"></i>全班+1</button><button class="batch-btn" id="class-dec"><i class="fa-solid fa-circle-minus"></i>全班-1</button><button class="batch-btn" id="class-reset"><i class="fa-regular fa-rotate-left"></i>全班清零</button></div>${content}</div>`;
                appDiv.innerHTML = html;
                attachVersionClickEvent();
                document.getElementById('profile-btn').addEventListener('click', showProfile);
                document.getElementById('settings-btn').addEventListener('click', showGlobalSettings);
                document.getElementById('more-features-detail-btn').addEventListener('click', e => { e.stopPropagation();
                    showMoreMenu(e.currentTarget); });
                document.getElementById('logout-btn').addEventListener('click', () => { if (confirm('退出登录？')) { currentUser =
                            null;
                        localStorage.removeItem(STORAGE_KEEP_LOGIN);
                        renderApp(); } });
                document.getElementById('switch-account-detail').addEventListener('click', showSwitchAccountModal);
                document.getElementById('back-to-list').addEventListener('click', () => { viewMode = 'list';
                    currentClassId = null;
                    renderMain(); });
                document.getElementById('student-rankings-btn').addEventListener('click', showStudentRankingsInClass);
                document.getElementById('svip-panel-btn').addEventListener('click', showSVIPPanel);
                document.getElementById('delete-class-detail').addEventListener('click', () => { if (confirm('删除班级？'))
                    { pushHistory();
                    userData.classes = userData.classes.filter(c => c.id !== currentClassId);
                    userData.students = userData.students.filter(s => s.classId !== currentClassId);
                    userData.groups = userData.groups.filter(g => g.classId !== currentClassId);
                    saveUserData(currentUser, userData);
                    viewMode = 'list';
                    currentClassId = null;
                    renderMain(); } });
                const handleBatch = (delta) => { pushHistory();
                    userData.students.forEach(s => { if (s.classId === currentClassId) s.points += delta; });
                    saveUserData(currentUser, userData);
                    document.querySelectorAll('.student-card').forEach(card => { const sid = card.dataset.studentId;
                        const stu = userData.students.find(s => s.id === sid); if (stu) { const pd = card
                                .querySelector('.student-points'); if (pd) { pd.textContent = stu.points;
                                pd.classList.remove('positive', 'negative'); if (stu.points > 0) pd.classList.add(
                                    'positive');
                                else if (stu.points < 0) pd.classList.add('negative'); } } }); };
                document.getElementById('class-inc').addEventListener('click', () => handleBatch(1));
                document.getElementById('class-dec').addEventListener('click', () => handleBatch(-1));
                document.getElementById('class-reset').addEventListener('click', () => { if (confirm('全班清零？')) { pushHistory();
                        userData.students.forEach(s => { if (s.classId === currentClassId) s.points = 0; });
                        saveUserData(currentUser, userData);
                        document.querySelectorAll('.student-card').forEach(card => { const pd = card.querySelector(
                                '.student-points'); if (pd) { pd.textContent = '0';
                                pd.classList.remove('positive', 'negative'); } }); } }); if (cls.groupMode) { document
                    .getElementById('tab-students').addEventListener('click', () => { classDetailTab = 'students';
                        renderClassDetail(); });
                    document.getElementById('tab-groups').addEventListener('click', () => { classDetailTab = 'groups';
                        renderClassDetail(); }); } if (classDetailTab === 'students') { document.getElementById(
                        'add-student-btn').addEventListener('click', () => { const name = document.getElementById(
                            'new-student-name').value.trim(); if (!name) return alert('请输入姓名');
                        pushHistory();
                        let gid = null; if (cls.groupMode) { const sel = document.getElementById(
                            'new-student-group'); if (sel) gid = sel.value || null; }
                        userData.students.push({ id: genId(), name, points: 0, classId: currentClassId,
                            groupId: gid });
                        saveUserData(currentUser, userData);
                        renderClassDetail(); });
                    document.getElementById('student-grid').addEventListener('click', e => { const btn = e.target
                            .closest('button'); if (!btn) return;
                        const action = btn.dataset.action,
                            sid = btn.dataset.studentId;
                        const stu = userData.students.find(s => s.id === sid); if (!stu) return; if (action ===
                            'student-inc') { pushHistory();
                            stu.points++;
                            saveUserData(currentUser, userData);
                            updateCard(btn, stu); } else if (action === 'student-dec') { pushHistory();
                            stu.points--;
                            saveUserData(currentUser, userData);
                            updateCard(btn, stu); } else if (action === 'student-delete') { if (confirm(
                                '删除学生？')) { pushHistory();
                                userData.students = userData.students.filter(s => s.id !== sid);
                                saveUserData(currentUser, userData);
                                renderClassDetail(); } } }); } else { document.getElementById('add-group-btn')
                    .addEventListener('click', () => { const name = document.getElementById('new-group-name').value
                            .trim(); if (!name) return alert('小组名');
                        pushHistory();
                        userData.groups.push({ id: genId(), name, classId: currentClassId });
                        saveUserData(currentUser, userData);
                        renderClassDetail(); });
                    document.querySelectorAll('[data-action="delete-group"]').forEach(btn => { btn.addEventListener(
                            'click', e => { e.stopPropagation();
                                const gid = btn.dataset.groupId; if (confirm('删除小组？成员变为无小组')) {
                                    pushHistory();
                                    userData.students.forEach(s => { if (s.groupId ===
                                        gid) s.groupId = null; });
                                    userData.groups = userData.groups.filter(g => g.id !==
                                    gid);
                                    saveUserData(currentUser, userData);
                                    renderClassDetail(); } }); }); }

                function updateCard(btn, stu) { const card = btn.closest('.student-card'); if (card) { const pd = card
                        .querySelector('.student-points'); if (pd) { pd.textContent = stu.points;
                        pd.classList.remove('positive', 'negative'); if (stu.points > 0) pd.classList.add('positive');
                        else if (stu.points < 0) pd.classList.add('negative'); } } }
                updateWatermark(); }

            function renderMain() { if (viewMode === 'profile') renderProfile(); else if (viewMode === 'list')
                    renderClassList();
                else renderClassDetail(); }

            function renderApp() { clearAllTimers(); if (currentUser) { userData = getUserData(currentUser); if (viewMode ===
                    'detail' && currentClassId && !userData.classes.some(c => c.id === currentClassId)) { viewMode =
                        'list';
                    currentClassId = null; } else if (viewMode !== 'profile') viewMode = 'list';
                applyTheme();
                renderMain(); } else renderAuth();
                updateWatermark(); if (currentUser) { addUndoButton();
                    createAppDrawer(); } else { const ex = document.getElementById('global-undo-fab'); if (ex) ex.remove();
                    removeAppDrawer(); } }

            function addUndoButton() { if (document.getElementById('global-undo-fab')) return;
                const btn = document.createElement('button');
                btn.id = 'global-undo-fab';
                btn.className = 'undo-fab';
                btn.innerHTML = '<i class="fa-solid fa-undo"></i>';
                btn.title = '撤销上一步操作';
                btn.addEventListener('click', e => { e.stopPropagation();
                    undo(); });
                document.body.appendChild(btn); }

            startHeartbeatDetection();
            tryAutoLogin();
            renderApp();
            const loader = document.getElementById('startupLoader');
            if (loader) {
                loader.querySelector('.sub').textContent = 'BetaNEXT-3.1';
                // 播放启动音效（延迟一点以配合界面显示）
                setTimeout(() => {
                    playStartupSound();
                }, 600);
                setTimeout(() => {
                    loader.classList.add('hide');
                    setTimeout(() => {
                        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
                    }, 600);
                }, 4500);
            }
        })();
    </script>
</body>
</html>
