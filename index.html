                        let groupId = null;
                        if (cls.groupMode) { const sel = document.getElementById('new-student-group'); if (sel) groupId = sel.value || null; }
                        userData.students.push({ id: genId(), name, points: 0, classId: currentClassId, groupId });
                        saveUserData(currentUser, userData);
                        renderClassDetail();
                    });
                    
                    const studentGrid = document.getElementById('student-grid');
                    if (studentGrid) {
                        studentGrid.addEventListener('click', (e) => {
                            const btn = e.target.closest('button');
                            if (!btn) return;
                            const action = btn.dataset.action;
                            const sid = btn.dataset.studentId;
                            const stu = userData.students.find(s => s.id === sid);
                            if (!stu) return;
                            
                            if (action === 'student-inc') {
                                pushHistory();
                                stu.points++;
                                saveUserData(currentUser, userData);
                                const card = btn.closest('.student-card');
                                if (card) {
                                    const pointsDiv = card.querySelector('.student-points');
                                    if (pointsDiv) {
                                        pointsDiv.textContent = stu.points;
                                        pointsDiv.classList.remove('positive', 'negative');
                                        if (stu.points > 0) pointsDiv.classList.add('positive');
                                        else if (stu.points < 0) pointsDiv.classList.add('negative');
                                    }
                                }
                            } else if (action === 'student-dec') {
                                pushHistory();
                                stu.points--;
                                saveUserData(currentUser, userData);
                                const card = btn.closest('.student-card');
                                if (card) {
                                    const pointsDiv = card.querySelector('.student-points');
                                    if (pointsDiv) {
                                        pointsDiv.textContent = stu.points;
                                        pointsDiv.classList.remove('positive', 'negative');
                                        if (stu.points > 0) pointsDiv.classList.add('positive');
                                        else if (stu.points < 0) pointsDiv.classList.add('negative');
                                    }
                                }
                            } else if (action === 'student-delete') {
                                if (confirm('删除学生？')) {
                                    pushHistory();
                                    userData.students = userData.students.filter(s => s.id !== sid);
                                    saveUserData(currentUser, userData);
                                    renderClassDetail();
                                }
                            }
                        });
                    }
                } else {
                    document.getElementById('add-group-btn').addEventListener('click', () => {
                        const name = document.getElementById('new-group-name').value.trim();
                        if (!name) return alert('小组名');
                        pushHistory();
                        userData.groups.push({ id: genId(), name, classId: currentClassId });
                        saveUserData(currentUser, userData);
                        renderClassDetail();
                    });
                    document.querySelectorAll('[data-action="delete-group"]').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const gid = btn.dataset.groupId; if (confirm('删除小组？成员变为无小组')) { pushHistory(); userData.students.forEach(s => { if (s.groupId === gid) s.groupId = null; }); userData.groups = userData.groups.filter(g => g.id !== gid); saveUserData(currentUser, userData); renderClassDetail(); } }); });
                }
                updateWatermark();
            }

            function renderMain() { if (viewMode === 'profile') renderProfile(); else if (viewMode === 'list') renderClassList(); else renderClassDetail(); }
            function renderApp() { 
                clearAllTimers(); 
                if (currentUser) { 
                    userData = getUserData(currentUser); 
                    if (viewMode === 'detail' && currentClassId && !userData.classes.some(c => c.id === currentClassId)) { 
                        viewMode = 'list'; 
                        currentClassId = null; 
                    } else if (viewMode !== 'profile') viewMode = 'list'; 
                    applyTheme(); 
                    renderMain(); 
                } else renderAuth(); 
                updateWatermark(); 
                if (currentUser) {
                    addUndoButton();
                    if (isSystemActivated()) {
                        createAppDrawer();
                    } else {
                        removeAppDrawer();
                    }
                } else {
                    const existing = document.getElementById('global-undo-fab');
                    if (existing) existing.remove();
                    removeAppDrawer();
                }
            }

            function addUndoButton() {
                if (document.getElementById('global-undo-fab')) return;
                const btn = document.createElement('button');
                btn.id = 'global-undo-fab';
                btn.className = 'undo-fab';
                btn.innerHTML = '<i class="fa-solid fa-undo"></i>';
                btn.title = '撤销上一步操作';
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    undo();
                });
                document.body.appendChild(btn);
            }

            startHeartbeatDetection();
            const autoLoginSuccess = tryAutoLogin();
            renderApp();

            const loader = document.getElementById('startupLoader');
            if (loader) {
                const subSpan = loader.querySelector('.sub');
                if (subSpan) subSpan.textContent = 'NEXT-2.1';
                setTimeout(() => {
                    loader.classList.add('hide');
                    setTimeout(() => {
                        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
                    }, 600);
                }, 4500);
            }
        })();
    </script>
</body>
</html>
