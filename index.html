<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>少年沃积分管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #03050a; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 1rem; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; transition: background 0.2s;
        }
        body.light-mode {
            background: #1a1e24;
            --bg-deep: #222831; --bg-elevated: #2d343d; --bg-card: rgba(45, 52, 61, 0.7); --bg-input: #3a424e;
            --border-muted: #4b5563; --border-glow: #6b7280; --text-primary: #ffffff; --text-secondary: #e5e7eb;
            --text-tertiary: #9ca3af; --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.3); --danger: #ef4444;
            --warning: #f59e0b; --success: #10b981;
            --card-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            --card-hover-shadow: 0 24px 40px -16px var(--accent), 0 0 0 1px var(--accent) inset;
        }
        body.light-mode .btn-primary, body.light-mode .timer-btn, body.light-mode .profile-btn,
        body.light-mode .modal-close, body.light-mode .svip-btn, body.light-mode .add-student-section button,
        body.light-mode .group-manager button, body.light-mode .tool-btn:hover, body.light-mode .batch-btn:hover,
        body.light-mode .back-btn:hover, body.light-mode .delete-class-detail:hover, body.light-mode .student-card-btn:hover {
            color: #ffffff !important;
        }
        body:not(.light-mode) .btn-primary, body:not(.light-mode) .timer-btn, body:not(.light-mode) .profile-btn,
        body:not(.light-mode) .modal-close, body:not(.light-mode) .svip-btn, body:not(.light-mode) .add-student-section button,
        body:not(.light-mode) .group-manager button { color: black; }
        body.cartoon-mode {
            background: #f9e5d2;
            --bg-deep: #ffefdb; --bg-elevated: #fff5e6; --bg-card: rgba(255, 226, 193, 0.7); --bg-input: #ffdbb5;
            --border-muted: #f5bc8f; --border-glow: #f0a56e; --text-primary: #5d3a1a; --text-secondary: #7b4f2b;
            --text-tertiary: #9b6e45; --accent: #f97316; --accent-glow: rgba(249, 115, 22, 0.3); --danger: #dc2626;
            --warning: #f59e0b; --success: #10b981;
            --card-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px #ffcba1 inset;
            --card-hover-shadow: 0 24px 40px -16px #f97316, 0 0 0 1px var(--accent) inset;
        }
        body.cartoon-mode .btn-primary, body.cartoon-mode .timer-btn, body.cartoon-mode .profile-btn,
        body.cartoon-mode .modal-close, body.cartoon-mode .svip-btn, body.cartoon-mode .add-student-section button,
        body.cartoon-mode .group-manager button { color: black; }
        :root {
            --bg-deep: #03050a; --bg-elevated: #0b0f16; --bg-card: rgba(19, 26, 36, 0.7); --bg-input: #1e2632;
            --border-muted: #25303e; --border-glow: #2f3f54; --text-primary: #f0f6ff; --text-secondary: #b8c9e6;
            --text-tertiary: #7f95b5; --accent: #3b82f6; --accent-hover: #5f9cf0; --accent-glow: rgba(59, 130, 246, 0.3);
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
            --card-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            --card-hover-shadow: 0 24px 40px -16px rgba(59, 130, 246, 0.3), 0 0 0 1px var(--accent) inset;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fatal-error-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a2f6c;
            background: linear-gradient(145deg, #1e3a8a, #0c1b3a); z-index: 10000; display: flex; flex-direction: column;
            align-items: flex-start; justify-content: center; padding-left: 10%; padding-right: 10%; text-align: left;
            font-family: monospace; color: white; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fatal-error-overlay h1 { font-size: 5rem; font-weight: 900; letter-spacing: 0.05em; text-shadow: 4px 4px 0 #0a1a3a; margin-bottom: 1rem; text-align: left; }
        .fatal-error-overlay .error-sub { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; background: rgba(0, 0, 0, 0.4); padding: 0.3rem 1.5rem; border-radius: 40px; display: inline-block; text-align: left; }
        .fatal-error-overlay .error-code { font-size: 1.1rem; background: #0a1f4a; padding: 0.5rem 1.2rem; border-radius: 30px; margin: 1rem 0; font-weight: bold; border: 1px solid #88aaff; display: inline-block; text-align: left; }
        .fatal-error-overlay .wechat-info { margin-top: 2rem; font-size: 1rem; background: rgba(0,0,0,0.5); padding: 0.6rem 1.5rem; border-radius: 40px; backdrop-filter: blur(8px); display: inline-block; text-align: left; }
        .fatal-error-overlay .reload-btn { margin-top: 2rem; background: white; color: #1e3a8a; border: none; padding: 0.6rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 40px; cursor: pointer; transition: 0.2s; display: inline-block; text-align: left; }
        .fatal-error-overlay .reload-btn:hover { transform: scale(1.02); background: #e0f0ff; }
        .logo h1, .class-title, .class-info, .student-name, .profile-field input, .profile-field select, .input-field,
        .user-greeting, .btn-icon, .tool-btn, .batch-btn, .back-btn, .delete-class-detail, .class-tab, .group-manager input,
        .add-student-section input, .add-student-section select, .modal-content, .profile-card, .auth-card, .feature-card h4,
        .timer-display, .student-points { color: var(--text-primary); }
        .class-stats, .footer-note, .checkbox-row, .forgot-password-link, .auth-tab:not(.active), .tool-section label,
        .student-actions-card .student-card-btn { color: var(--text-secondary); }
        .profile-field label, .empty-grid, .svip-section span:not(.svip-badge) { color: var(--text-tertiary); }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--accent); color: black; border-radius: 50%; font-size: 0.9rem; font-weight: 700; margin-right: 12px; }
        .logo h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(145deg, #ff6ec4, #7873f5, #3b82f6, #6ee7b7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.02em; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; text-shadow: 0 0 8px rgba(59,130,246,0.3); }
        .logo .version, .logo .vip-version { font-size: 0.95rem; font-weight: 600; padding: 0.2rem 0.9rem; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); background-color: rgba(255,255,255,0.02); background-image: linear-gradient(145deg, #ffb86b, #ff6bcb, #6bc5ff); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-block; cursor: pointer; transition: all 0.2s ease; }
        .logo .version:hover { transform: scale(1.02); filter: brightness(1.1); text-shadow: 0 0 6px rgba(255,255,200,0.5); }
        #app { width: 100%; max-width: 1440px; min-height: 90vh; background: var(--bg-deep); border-radius: 2.5rem; box-shadow: 0 30px 60px -20px black, 0 0 0 1px #1f2937; overflow: hidden; display: flex; flex-direction: column; backdrop-filter: blur(2px); position: relative; animation: appEnter 0.45s cubic-bezier(0.2,0.9,0.4,1.1) forwards; }
        @keyframes appEnter { from { opacity: 0; transform: scale(0.98) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        #app::before { content: ''; position: absolute; top: -15%; left: -10%; width: 50%; height: 50%; background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%); pointer-events: none; z-index: 0; }
        #app::after { content: ''; position: absolute; bottom: -15%; right: -10%; width: 50%; height: 50%; background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%); pointer-events: none; z-index: 0; }
        .app-header, .main-container, .detail-container, .auth-container { position: relative; z-index: 2; }
        .main-container, .detail-container, .auth-container { animation: contentFadeUp 0.4s ease-out; }
        @keyframes contentFadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .app-header { padding: 1.5rem 2.8rem; background: rgba(10,15,25,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.2rem; box-shadow: 0 10px 25px -10px black; }
        .user-area { display: flex; align-items: center; gap: 1.5rem; }
        .user-greeting { background: rgba(255,255,255,0.02); backdrop-filter: blur(8px); padding: 0.6rem 1.5rem; border-radius: 60px; border: 1px solid rgba(255,255,255,0.03); font-size: 1rem; font-weight: 500; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: var(--transition); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .user-greeting:hover { border-color: var(--accent); box-shadow: 0 8px 18px var(--accent-glow); transform: translateY(-2px); }
        .btn-icon { background: rgba(255,255,255,0.02); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.03); padding: 0.6rem 1.5rem; border-radius: 60px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .btn-icon:hover { background: rgba(59,130,246,0.1); border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 16px var(--accent-glow); }
        .btn-icon:active { transform: scale(0.96); transition: transform 0.05s; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000; animation: modalOverlayFade 0.2s ease-out; }
        @keyframes modalOverlayFade { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 2rem; padding: 2rem; max-width: 500px; width: 90%; box-shadow: 0 25px 50px black; animation: modalZoomIn 0.3s cubic-bezier(0.34,1.2,0.64,1); backdrop-filter: blur(16px); position: relative; }
        @keyframes modalZoomIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        .modal-content h2 { color: var(--accent); margin-bottom: 1rem; }
        .modal-close { background: var(--accent); border: none; border-radius: 60px; padding: 0.6rem 2rem; font-weight: 600; cursor: pointer; float: right; color: black; transition: all 0.2s ease; }
        .modal-close:hover { transform: scale(1.02); filter: brightness(1.05); }
        .modal-close:active { transform: scale(0.97); }
        .account-list { list-style: none; margin: 1.5rem 0; max-height: 300px; overflow-y: auto; }
        .account-item { padding: 0.8rem 1.2rem; background: var(--bg-input); border-radius: 60px; margin-bottom: 0.5rem; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; }
        .account-item:hover { background: var(--accent); color: black; transform: translateX(5px); }
        .profile-card { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 2.5rem; padding: 2rem; max-width: 800px; width: 90%; animation: fadeScaleIn 0.3s ease; backdrop-filter: blur(12px); }
        @keyframes fadeScaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(145deg, var(--accent), #2563eb); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; color: white; margin: 0 auto 1.5rem; transition: transform 0.2s; }
        .profile-avatar:hover { transform: scale(1.02); }
        .profile-field { margin-bottom: 1.2rem; }
        .profile-field label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
        .profile-field input, .profile-field select { width: 100%; background: var(--bg-input); border: 1px solid var(--border-muted); border-radius: 60px; padding: 0.8rem 1.2rem; font-size: 1rem; transition: all 0.2s; }
        .profile-field input:focus, .profile-field select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); outline: none; }
        .svip-section { background: rgba(255,255,255,0.02); border-radius: 60px; padding: 1rem 1.5rem; margin: 1.5rem 0; display: flex; align-items: center; justify-content: space-between; }
        .svip-badge { background: gold; color: black; padding: 0.2rem 1rem; border-radius: 60px; font-weight: 600; }
        .svip-btn { background: var(--accent); border: none; border-radius: 60px; padding: 0.5rem 1.5rem; font-weight: 600; cursor: pointer; color: black; transition: all 0.2s; }
        .svip-btn:hover { transform: scale(1.02); filter: brightness(1.05); }
        .profile-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }
        .profile-btn { background: var(--accent); border: none; border-radius: 60px; padding: 0.7rem 2rem; font-weight: 600; cursor: pointer; color: black; transition: all 0.2s; }
        .profile-btn:hover { transform: translateY(-2px); filter: brightness(1.05); box-shadow: 0 4px 12px var(--accent-glow); }
        .profile-btn:active { transform: scale(0.97); }
        .profile-btn.secondary { background: rgba(255,255,255,0.02); }
        .svip-features { margin-top: 2rem; padding: 1.5rem; background: rgba(59,130,246,0.1); border-radius: 2rem; border: 1px solid var(--accent); backdrop-filter: blur(8px); }
        .svip-features h3 { color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .feature-card { background: var(--bg-card); border-radius: 1.5rem; padding: 1.2rem; text-align: center; border: 1px solid var(--border-glow); transition: all 0.25s; backdrop-filter: blur(8px); }
        .feature-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 12px 20px -8px var(--accent-glow); }
        .timer-display { font-size: 2.5rem; font-weight: 700; font-family: monospace; margin: 1rem 0; }
        .timer-controls, .stopwatch-controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
        .timer-btn { background: var(--accent); border: none; border-radius: 60px; padding: 0.5rem 1.2rem; font-weight: 600; cursor: pointer; color: black; transition: var(--transition); }
        .timer-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px var(--accent-glow); }
        .timer-btn:active { transform: scale(0.96); }
        .timer-btn.secondary { background: rgba(255,255,255,0.1); }
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .auth-card { background: var(--bg-card); width: 100%; max-width: 460px; border-radius: 2.5rem; padding: 2.8rem 2.5rem; border: 1px solid var(--border-glow); box-shadow: var(--card-shadow); animation: cardGlow 0.5s ease-out; backdrop-filter: blur(16px); }
        @keyframes cardGlow { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border-muted); padding-bottom: 1.2rem; }
        .auth-tab { flex: 1; background: transparent; border: none; font-size: 1.3rem; font-weight: 600; padding: 0.7rem; border-radius: 60px; cursor: pointer; transition: var(--transition); }
        .auth-tab.active { background: rgba(59,130,246,0.15); box-shadow: 0 0 0 1px var(--accent); }
        .auth-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .input-field { background: var(--bg-input); border: 1px solid var(--border-muted); border-radius: 60px; padding: 1rem 1.8rem; font-size: 1rem; outline: none; transition: var(--transition); }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .checkbox-row { display: flex; align-items: center; gap: 0.6rem; font-size: 0.95rem; }
        .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); transition: transform 0.1s; }
        .checkbox-row input:active { transform: scale(0.9); }
        .captcha-row { display: flex; align-items: center; gap: 0.8rem; background: var(--bg-input); padding: 0.7rem 1.2rem; border-radius: 60px; border: 1px solid var(--border-muted); }
        .captcha-row span { font-weight: 600; }
        .captcha-input { width: 90px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-muted); border-radius: 60px; padding: 0.5rem 1rem; text-align: center; }
        .captcha-refresh { background: transparent; border: 1px solid var(--border-muted); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; transition: var(--transition); }
        .captcha-refresh:hover { background: var(--accent); color: black; border-color: var(--accent); transform: rotate(15deg); }
        .btn-primary { background: linear-gradient(145deg, var(--accent), #2563eb); border: none; border-radius: 60px; padding: 1rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: var(--transition); box-shadow: 0 8px 18px rgba(37,99,235,0.3); color: black; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 12px 24px var(--accent-glow); }
        .btn-primary:active { transform: scale(0.98); }
        .forgot-password-link { text-align: right; cursor: pointer; font-size: 0.9rem; text-decoration: underline; margin-top: -0.5rem; transition: color 0.2s; }
        .forgot-password-link:hover { color: var(--accent-hover); }
        .main-container, .detail-container { flex: 1; padding: 2rem 2.5rem; }
        .toolbar { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; background: rgba(15,23,35,0.5); backdrop-filter: blur(12px); border-radius: 3rem; padding: 1.2rem 2.2rem; border: 1px solid rgba(255,255,255,0.02); box-shadow: var(--card-shadow); margin-bottom: 2.8rem; animation: slideDownFade 0.35s ease; }
        @keyframes slideDownFade { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        .tool-section { display: flex; align-items: center; gap: 0.8rem; background: rgba(0,0,0,0.3); padding: 0.3rem 1rem 0.3rem 1.5rem; border-radius: 60px; border: 1px solid rgba(255,255,255,0.02); }
        .tool-btn { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); border-radius: 60px; padding: 0.6rem 1.4rem; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: var(--transition); }
        .tool-btn:hover { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); transform: translateY(-2px); }
        .tool-btn:active { transform: translateY(1px); }
        .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        .class-card { background: rgba(20,30,42,0.6); backdrop-filter: blur(12px); border-radius: 2.5rem; border: 1px solid rgba(255,255,255,0.02); padding: 2rem; transition: var(--transition); cursor: pointer; display: flex; flex-direction: column; gap: 1rem; box-shadow: var(--card-shadow); animation: none; }
        .class-card:hover { border-color: var(--accent); transform: translateY(-6px); box-shadow: var(--card-hover-shadow); }
        .class-header { display: flex; justify-content: space-between; align-items: center; }
        .class-title { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .class-title i { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
        .class-stats { font-size: 1rem; display: flex; gap: 1.5rem; }
        .delete-class-btn { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: var(--transition); }
        .delete-class-btn:hover { background: var(--danger); color: white; border-color: var(--danger); transform: scale(1.05); }
        .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
        .back-btn { background: rgba(255,255,255,0.02); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.03); padding: 0.7rem 1.6rem; border-radius: 60px; font-size: 1rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: var(--transition); }
        .back-btn:hover { background: var(--accent); color: black; border-color: var(--accent); transform: translateX(-4px); }
        .class-info { font-size: 2rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .delete-class-detail { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); padding: 0.7rem 1.6rem; border-radius: 60px; font-size: 1rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: var(--transition); }
        .delete-class-detail:hover { background: var(--danger); color: white; transform: scale(1.02); }
        .class-tabs { display: flex; gap: 1rem; margin: 2rem 0 1.5rem; }
        .class-tab { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); padding: 0.7rem 2rem; border-radius: 60px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); }

        .wb-size-indicator.active { border-color: #fff; background: rgba(255,255,255,0.15); }
        .wb-size-dot { border-radius: 50%; background: #fff; }
        @media (max-width: 768px) { .whiteboard-navbar { padding: 0.4rem 0.6rem; } .whiteboard-navbar .nav-title { font-size: 0.9rem; } .whiteboard-navbar button { padding: 0.3rem 0.7rem; font-size: 0.75rem; } .wb-tool-btn { width: 34px; height: 34px; font-size: 0.85rem; } .wb-color-dot { width: 22px; height: 22px; } .whiteboard-toolbar { padding: 0.4rem 0.5rem; gap: 0.3rem; } .wb-tool-group { padding: 3px 5px; } }
        .app-drawer-window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 90%; max-width: 600px; max-height: 80vh; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-glow); border-radius: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 2000; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1); overflow: hidden; }
        .app-drawer-window.open { transform: translate(-50%, -50%) scale(1); }
        .window-titlebar { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1.5rem; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-muted); cursor: move; user-select: none; position: relative; }
        .window-title { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; color: var(--text-primary); }
        /* 窗口标题绝对居中 */
        .window-title {
            position: absolute !important;

        }
        .window-close { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .window-close:hover { background: var(--danger); color: white; }
        .window-minimize { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .window-minimize:hover { background: var(--accent); color: black; }
        .window-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .macos-traffic-lights { display: flex; gap: 8px; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .macos-traffic-lights .close { background: #ff5f57; border-radius: 50%; width: 12px; height: 12px; }
        .macos-traffic-lights .minimize { background: #ffbd2e; border-radius: 50%; width: 12px; height: 12px; }
        .macos-traffic-lights .zoom { background: #28ca42; border-radius: 50%; width: 12px; height: 12px; }
        .mac-dock { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 12px; background: rgba(30,30,30,0.85); backdrop-filter: blur(20px); padding: 8px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.15); z-index: 9998; box-shadow: 0 10px 30px rgba(0,0,0,0.5); align-items: flex-end; }
        .mac-dock-item { width: 48px; height: 48px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .mac-dock-item:hover { transform: scale(1.2); margin-bottom: 5px; }
        .mac-dock-item::after { content: attr(data-title); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 6px; white-space: nowrap; display: none; margin-bottom: 8px; }
        .mac-dock-item:hover::after { display: block; }
        /* 设置分类样式 */
        .settings-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-muted); padding-bottom: 0.5rem; flex-wrap: wrap; }
        .settings-tab { background: transparent; border: none; padding: 0.5rem 1.2rem; border-radius: 60px; color: var(--text-secondary); cursor: pointer; font-weight: 600; transition: var(--transition); font-size: 0.95rem; }
        .settings-tab.active { background: var(--accent); color: black; }
        .settings-tab:hover:not(.active) { background: rgba(255,255,255,0.05); }
        .settings-tab-content { padding: 0.5rem 0; }
        /* 搜索栏样式 */
        .search-bar-container { margin-bottom: 1rem; }
        .search-bar-container input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-muted); border-radius: 60px; padding: 0.8rem 1.5rem; font-size: 1rem; outline: none; transition: var(--transition); color: var(--text-primary); }
        .search-bar-container input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        .search-bar-container input::placeholder { color: var(--text-tertiary); }
        /* 分页样式 */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 0.8rem; margin-top: 1rem; }
        .pagination-container button { background: rgba(255,255,255,0.02); border: 1px solid var(--border-muted); border-radius: 60px; padding: 0.5rem 1.2rem; color: var(--text-primary); cursor: pointer; font-weight: 600; transition: var(--transition); }
        .pagination-container button:hover:not(:disabled) { background: var(--accent); color: black; border-color: var(--accent); }
        .pagination-container button:disabled { opacity: 0.4; cursor: default; }
        .pagination-container span { color: var(--text-secondary); font-size: 0.9rem; }
        /* 登录页轮播样式 */
        .auth-carousel-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
        .auth-carousel { width: 100%; height: 100%; position: relative; }
        .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 0; transition: opacity 0.8s ease; }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide i { font-size: 4rem; margin-bottom: 1.5rem; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .carousel-slide h2 { font-size: 2rem; color: var(--text-primary); margin-bottom: 0.5rem; }
        .carousel-slide p { font-size: 1.1rem; color: var(--text-secondary); }
        @media (max-width: 900px) { .auth-container { flex-direction: column; } .auth-carousel-container { display: none; } }
        /* 小沃AI新增样式 */
        .ai-assistant-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5000;
            display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px); pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .ai-assistant-container.active { opacity: 1; pointer-events: auto; }
        .ai-assistant-panel {
            background: var(--bg-card); border-radius: 2rem; padding: 2rem; max-width: 600px; width: 90%;
            box-shadow: 0 25px 50px black; backdrop-filter: blur(20px); border: 1px solid var(--border-glow);
            position: relative; animation: modalZoomIn 0.3s ease;
        }
        .ai-assistant-panel h3 { color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .ai-chat-log { height: 300px; overflow-y: auto; background: var(--bg-input); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .ai-msg { margin-bottom: 0.5rem; padding: 0.5rem 1rem; border-radius: 1rem; max-width: 80%; }
        .ai-msg.user { background: var(--accent); color: black; align-self: flex-end; margin-left: auto; }
        .ai-msg.assistant { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .ai-input-bar { display: flex; gap: 0.5rem; }
        .ai-input-bar input { flex: 1; background: var(--bg-input); border: 1px solid var(--border-muted); border-radius: 60px; padding: 0.8rem 1.2rem; color: var(--text-primary); outline: none; }
        .ai-input-bar button { background: var(--accent); border: none; border-radius: 60px; padding: 0.5rem 1.2rem; color: black; cursor: pointer; font-weight: 600; }
        .voice-packs-manager { margin-top: 1rem; }
        .voice-pack-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 1rem; margin-bottom: 0.5rem; }
        .voice-pack-item button { background: var(--accent); border: none; border-radius: 60px; padding: 0.2rem 0.8rem; color: black; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="startup-loader" id="startupLoader">
        <div class="shenlin-os-logo">
            <div class="logo-row">
                <div class="main-title">shenlinOS</div>
                <div class="version-big">4.0</div>
            </div>
            <div class="sub"></div>
        </div>
        <div class="powered">Powered by <strong>Open shenlinOS</strong></div>
        <div class="loader-spinner"></div>
    </div>
    <div id="app"></div>

    <!-- 小沃AI助手界面 -->
    <div class="ai-assistant-container" id="aiAssistantContainer">
        <div class="ai-assistant-panel">
            <h3><i class="fa-solid fa-robot"></i> 小沃AI</h3>
            <div class="ai-chat-log" id="aiChatLog"></div>
            <div class="ai-input-bar">
                <input type="text" id="aiCommandInput" placeholder="输入指令或语音问询...">
                <button id="aiSendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                <button id="aiCloseBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div style="margin-top:1rem;">
                <button class="profile-btn" id="openVoicePacksBtn" style="width:100%;"><i class="fa-solid fa-record-vinyl"></i> 管理语音包</button>
            </div>
            <div class="voice-packs-manager" id="voicePacksManager" style="display:none;"></div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_USERS = 'points_users';
            const STORAGE_REMEMBER = 'remember_credentials';
            const STORAGE_KEEP_LOGIN = 'keep_login';
            const STORAGE_THEME = 'user_theme';
            const STORAGE_DEV_MODE = 'dev_mode_active';
            const STORAGE_AI_ENABLED = 'ai_enabled';
            const STORAGE_VOICE_PACKS = 'ai_voice_packs';
            const VERSION_STRING = 'shenlinOS 4.0';

            let aiEnabled = localStorage.getItem(STORAGE_AI_ENABLED) === 'true';
            let voicePacks = JSON.parse(localStorage.getItem(STORAGE_VOICE_PACKS) || '[]');
            let aiAssistantActive = false;
            let recognition = null;
            let synth = window.speechSynthesis;

            function saveVoicePacks() {
                localStorage.setItem(STORAGE_VOICE_PACKS, JSON.stringify(voicePacks));
            }

            function startWakeWordDetection() {
                if (!aiEnabled || !currentUser) return;
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
                if (recognition) try { recognition.stop(); } catch(e) {}
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.lang = 'zh-CN';
                recognition.interimResults = false;
                recognition.onresult = (event) => {
                    const last = event.results[event.results.length - 1];
                    const transcript = last[0].transcript.trim();
                    if (transcript.includes('小沃小沃') || transcript.includes('小沃') || transcript.includes('小蜗')) {
                        openAIAssistant();
                    }
                };
                recognition.onerror = () => {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e) {}
                    }, 2000);
                };
                try { recognition.start(); } catch(e) {}
            }

            function stopWakeWordDetection() {
                if (recognition) {
                    recognition.stop();
                    recognition = null;
                }
            }

            function openAIAssistant() {
                if (!aiEnabled) {
                    alert('请先在设置中开启小沃AI功能');
                    showGlobalSettings();
                    return;
                }
                const container = document.getElementById('aiAssistantContainer');
                if (!container) return;
                container.classList.add('active');
                aiAssistantActive = true;
                document.getElementById('aiCommandInput').focus();
                addAIMessage('assistant', '我是小沃AI，可以帮你加减积分、查看学生积分、查看排名、查看时间、天气等。请说指令或使用文字输入。');
            }

            function closeAIAssistant() {
                const container = document.getElementById('aiAssistantContainer');
                if (container) container.classList.remove('active');
                aiAssistantActive = false;
            }

            function addAIMessage(role, text) {
                const log = document.getElementById('aiChatLog');
                if (!log) return;
                const div = document.createElement('div');
                div.className = `ai-msg ${role}`;
                div.textContent = text;
                log.appendChild(div);
                log.scrollTop = log.scrollHeight;
            }

            async function processAICommand(command) {
                addAIMessage('user', command);
                const cmd = command.toLowerCase().replace(/小沃|小蜗/g, '').trim();
                let response = '';
                if (/给(.+)加(\d+)分/.test(cmd)) {
                    const match = cmd.match(/给(.+)加(\d+)分/);
                    const name = match[1];
                    const delta = parseInt(match[2]);
                    const student = userData.students.find(s => s.name === name && s.classId === currentClassId);
                    if (student) {
                        student.points += delta;
                        saveUserData(currentUser, userData);
                        response = `${name}的积分已增加${delta}分，当前${student.points}分`;
                    } else {
                        response = `未找到学生：${name}`;
                    }
                } else if (/给(.+)减(\d+)分/.test(cmd)) {
                    const match = cmd.match(/给(.+)减(\d+)分/);
                    const name = match[1];
                    const delta = parseInt(match[2]);
                    const student = userData.students.find(s => s.name === name && s.classId === currentClassId);
                    if (student) {
                        student.points -= delta;
                        saveUserData(currentUser, userData);
                        response = `${name}的积分已减少${delta}分，当前${student.points}分`;
                    } else {
                        response = `未找到学生：${name}`;
                    }
                } else if (/查看(.+)的积分/.test(cmd)) {
                    const match = cmd.match(/查看(.+)的积分/);
                    const name = match[1];
                    const student = userData.students.find(s => s.name === name && s.classId === currentClassId);
                    response = student ? `${name}的积分：${student.points}` : '未找到该学生';
                } else if (/学生排名|积分排名|排行榜/.test(cmd)) {
                    if (!currentClassId) {
                        response = '请先进入一个班级';
                    } else {
                        const stus = userData.students.filter(s => s.classId === currentClassId).sort((a,b) => b.points - a.points);
                        response = stus.slice(0, 5).map((s,i) => `${i+1}. ${s.name} ${s.points}分`).join('；');
                    }
                } else if (/时间|现在几点/.test(cmd)) {
                    response = new Date().toLocaleTimeString();
                } else if (/天气/.test(cmd)) {
                    response = '天气功能请安装天气应用或联网查询，目前暂不支持自动获取。';
                } else if (/打开(.+)/.test(cmd)) {
                    const target = cmd.match(/打开(.+)/)[1];
                    if (target.includes('更新')) { showSystemUpdater(); response = '已打开系统更新'; }
                    else if (target.includes('白板')) { showWhiteboardApp(); response = '已打开白板'; }
                    else if (target.includes('快手')) { showKuaishouApp(); response = '已打开快手'; }
                    else { response = `无法打开：${target}`; }
                } else {
                    response = '抱歉，我没理解你的意思。可以尝试：“给张三加5分”、“查看王五的积分”、“排行榜”等。';
                }
                addAIMessage('assistant', response);
                if (aiEnabled && synth) {
                    const utter = new SpeechSynthesisUtterance(response);
                    utter.lang = 'zh-CN';
                    synth.speak(utter);
                }
            }

            function showVoicePacksManager() {
                const container = document.getElementById('voicePacksManager');
                if (!container) return;
                container.style.display = container.style.display === 'none' ? 'block' : 'none';
                renderVoicePackList();
            }

            function renderVoicePackList() {
                const container = document.getElementById('voicePacksManager');
                if (!container) return;
                let html = '<h4 style="margin-bottom:0.5rem;">语音包列表</h4>';
                if (voicePacks.length === 0) html += '<p>暂无语音包，可创建或导入</p>';
                else {
                    voicePacks.forEach((vp, index) => {
                        html += `<div class="voice-pack-item">
                            <span>${vp.name}</span>
                            <div>
                                <button onclick="window.playVoicePack(${index})">试听</button>
                                <button onclick="window.deleteVoicePack(${index})">删除</button>
                            </div>
                        </div>`;
                    });
                }
                html += `
                    <div style="display:flex;gap:1rem;margin-top:1rem;">
                        <button class="profile-btn" id="createVoicePackBtn">录制新语音包</button>
                        <button class="profile-btn" id="importVoicePackBtn">导入音频文件</button>
                    </div>`;
                container.innerHTML = html;
                document.getElementById('createVoicePackBtn')?.addEventListener('click', createVoicePack);
                document.getElementById('importVoicePackBtn')?.addEventListener('click', importVoicePack);
            }

            async function createVoicePack() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    let chunks = [];
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        const name = prompt('请输入语音包名称：');
                        if (!name) return;
                        voicePacks.push({ name, audioUrl: url, blob: blob });
                        saveVoicePacks();
                        renderVoicePackList();
                    };
                    mediaRecorder.start();
                    alert('开始录制，点击确定停止录制');
                    setTimeout(() => {
                        mediaRecorder.stop();
                        stream.getTracks().forEach(t => t.stop());
                    }, 3000);
                } catch (e) {
                    alert('无法访问麦克风');
                }
            }

            function importVoicePack() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'audio/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const url = URL.createObjectURL(file);
                    const name = file.name.replace(/\.[^/.]+$/, '');
                    voicePacks.push({ name, audioUrl: url, file });
                    saveVoicePacks();
                    renderVoicePackList();
                };
                input.click();
            }

            window.playVoicePack = function(index) {
                const vp = voicePacks[index];
                const audio = new Audio(vp.audioUrl);
                audio.play();
            };

            window.deleteVoicePack = function(index) {
                voicePacks.splice(index, 1);
                saveVoicePacks();
                renderVoicePackList();
            };

            // 重载 showGlobalSettings 添加小沃AI选项卡
            const originalShowGlobalSettings = showGlobalSettings;
            showGlobalSettings = function() {
                originalShowGlobalSettings();
                const m = document.querySelector('.modal-overlay:last-of-type');
                if (!m) return;
                const tabsContainer = m.querySelector('.settings-tabs');
                if (!tabsContainer || tabsContainer.querySelector('[data-tab="ai"]')) return;
                const aiTab = document.createElement('button');
                aiTab.className = 'settings-tab';
                aiTab.dataset.tab = 'ai';
                aiTab.textContent = '小沃AI';
                tabsContainer.appendChild(aiTab);
                const contentDiv = m.querySelector('.modal-content');
                const aiContent = document.createElement('div');
                aiContent.className = 'settings-tab-content';
                aiContent.id = 'tab-ai';
                aiContent.style.display = 'none';
                aiContent.innerHTML = `
                    <div style="margin:1.5rem 0;">
                        <label>小沃AI语音助手</label>
                        <div style="display:flex;align-items:center;gap:1rem;margin-top:0.5rem;">
                            <span>开启状态：</span>
                            <label class="switch">
                                <input type="checkbox" id="ai-switch" ${aiEnabled ? 'checked' : ''}>
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <p style="color:var(--text-secondary);font-size:0.8rem;margin-top:0.3rem;">开启后可通过语音唤醒词“小沃小沃”激活助手，<br>并在启动台中显示小沃AI图标。</p>
                    </div>
                `;
                contentDiv.appendChild(aiContent);
                const newTabs = m.querySelectorAll('.settings-tab');
                const contents = m.querySelectorAll('.settings-tab-content');
                newTabs.forEach(tab => {
                    tab.addEventListener('click', function(e) {
                        const target = this.dataset.tab;
                        if (target === 'update') { m.remove(); showSystemUpdater(); return; }
                        newTabs.forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        contents.forEach(c => c.style.display = 'none');
                        const tc = m.querySelector(`#tab-${target}`);
                        if (tc) tc.style.display = 'block';
                    });
                });
                const aiSwitch = document.getElementById('ai-switch');
                if (aiSwitch) {
                    aiSwitch.addEventListener('change', function() {
                        aiEnabled = this.checked;
                        localStorage.setItem(STORAGE_AI_ENABLED, aiEnabled);
                        if (aiEnabled) {
                            startWakeWordDetection();
                        } else {
                            stopWakeWordDetection();
                        }
                        refreshAppDrawer();
                    });
                }
            };

            function initAI() {
                if (aiEnabled) {
                    startWakeWordDetection();
                }
                document.addEventListener('click', function(e) {
                    if (e.target.id === 'aiSendBtn' || e.target.closest('#aiSendBtn')) {
                        const input = document.getElementById('aiCommandInput');
                        if (input && input.value.trim()) {
                            processAICommand(input.value.trim());
                            input.value = '';
                        }
                    } else if (e.target.id === 'aiCloseBtn' || e.target.closest('#aiCloseBtn')) {
                        closeAIAssistant();
                    } else if (e.target.id === 'openVoicePacksBtn' || e.target.closest('#openVoicePacksBtn')) {
                        showVoicePacksManager();
                    }
                });
                document.getElementById('aiCommandInput')?.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        document.getElementById('aiSendBtn')?.click();
                    }
                });
            }

            // 以下为原有全部 JS 代码，未改动
            const genId = () => 'id_' + Date.now() + Math.random().toString(36).substr(2, 6);
            const encodePass = (pwd) => btoa(pwd);
            const decodePass = (encoded) => atob(encoded);
            const defaultProfile = { avatar: '', gender: '保密', vipExpire: 0, systemActivatedUntil: 0 };

            function showSVIPPanel() { if ((userData.profile?.vipExpire || 0) <= Date.now()) { alert('此功能仅限SVIP使用'); return; } const stus = userData.students.filter(s => s.classId === currentClassId); const m = document.createElement('div'); m.className = 'modal-overlay'; m.innerHTML = `<div class="modal-content" style="max-width:700px;"><h2><i class="fa-regular fa-gem"></i> SVIP专属功能面板</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin:1.5rem 0;"><div class="feature-card"><h4>⏳ 倒计时</h4><div class="timer-display" id="panel-countdown-display">05:00</div><div class="timer-controls"><button class="timer-btn" id="panel-countdown-start">开始</button><button class="timer-btn secondary" id="panel-countdown-pause">暂停</button><button class="timer-btn secondary" id="panel-countdown-reset">重置</button></div><div><input type="number" id="panel-countdown-set" value="5" min="1" max="60" style="width:70px;background:var(--bg-input);border-radius:60px;padding:0.3rem;"> 分钟</div></div><div class="feature-card"><h4>⏱️ 秒表</h4><div class="timer-display" id="panel-stopwatch-display">00:00.0</div><div class="stopwatch-controls"><button class="timer-btn" id="panel-stopwatch-start">开始</button><button class="timer-btn secondary" id="panel-stopwatch-pause">暂停</button><button class="timer-btn secondary" id="panel-stopwatch-reset">重置</button></div></div><div class="feature-card" style="grid-column:span 2;"><h4>🎲 随机点名</h4><div style="font-size:2rem;margin:1rem 0;min-height:4rem;color:var(--accent);" id="random-student-result">——</div><button class="timer-btn" id="random-student-btn" style="font-size:1.2rem;padding:0.8rem 2rem;">点我随机点名（按权重）</button><p style="color:var(--text-secondary);margin-top:0.5rem;">当前学生数: ${stus.length}</p></div></div><button class="modal-close" id="panel-close">关闭</button></div>`; document.body.appendChild(m); makeModalWindow(m, 'SVIP专属功能面板', '<i class="fa-regular fa-gem"></i>'); let cTime=300, cInt=null, cRun=false; let sTime=0, sInt=null, sRun=fals                     document.querySelectorAll('[data-action="delete-group"]').forEach(btn => { btn.addEventListener('click', e => { e.stopPropagation(); const gid = btn.dataset.groupId; if (confirm('删除小组？成员变为无小组')) { pushHistory(); userData.students.forEach(s => { if (s.groupId === gid) s.groupId = null; }); userData.groups = userData.groups.filter(g => g.id !== gid); saveUserData(currentUser, userData); renderClassDetail(); } }); });
                }
                function updateCard(btn, stu) { const card = btn.closest('.student-card'); if (card) { const pd = card.querySelector('.student-points'); if (pd) { pd.textContent = stu.points; pd.classList.remove('positive','negative'); if (stu.points > 0) pd.classList.add('positive'); else if (stu.points < 0) pd.classList.add('negative'); } } }
                updateWatermark();
            }

            function renderMain() { if (viewMode === 'profile') renderProfile(); else if (viewMode === 'list') renderClassList(); else renderClassDetail(); }
            function renderApp() { clearAllTimers(); if (currentUser) { userData = getUserData(currentUser); if (viewMode === 'detail' && currentClassId && !userData.classes.some(c => c.id === currentClassId)) { viewMode = 'list'; currentClassId = null; } else if (viewMode !== 'profile') viewMode = 'list'; applyTheme(); renderMain(); } else renderAuth(); updateWatermark(); if (currentUser) { addUndoButton(); createAppDrawer(); } else { const ex = document.getElementById('global-undo-fab'); if (ex) ex.remove(); removeAppDrawer(); } }
            function addUndoButton() { if (document.getElementById('global-undo-fab')) return; const btn = document.createElement('button'); btn.id = 'global-undo-fab'; btn.className = 'undo-fab'; btn.innerHTML = '<i class="fa-solid fa-undo"></i>'; btn.title = '撤销上一步操作'; btn.addEventListener('click', e => { e.stopPropagation(); undo(); }); document.body.appendChild(btn); }

            startHeartbeatDetection();
            tryAutoLogin();
            renderApp();
            initAI();
            const loader = document.getElementById('startupLoader');
            if (loader) {
                setTimeout(() => { playStartupSound(); }, 600);
                setTimeout(() => { loader.classList.add('hide'); setTimeout(() => { if (loader && loader.parentNode) loader.parentNode.removeChild(loader); }, 600); }, 4500);
            }
        })();
    </script>
</body>
</html>
